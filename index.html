<style>
:root {
  --bg: #0a0f1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d45;
  --accent: #f0c040;
  --accent2: #e8421a;
  --text: #e8eaf0;
  --muted: #6b7a99;
  --live: #22c55e;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

/* Header */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: var(--font-display);
  font-size: 1.6rem;
  letter-spacing: 0.05em;
  color: var(--accent);
}
.logo span { color: var(--text); }
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--live);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--live);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Nav tabs */
nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 1.5rem;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }
.tab {
  padding: 0.75rem 1.25rem;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.2s, border-color 0.2s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: var(--font-body);
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Main layout */
main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

/* Section heading */
.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
}
.section-head h2 {
  font-family: var(--font-display);
  font-size: 1.3rem;
  letter-spacing: 0.05em;
  color: var(--text);
}
.count-pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  padding: 2px 8px;
  border-radius: 20px;
}

/* Match card */
.matches { display: flex; flex-direction: column; gap: 8px; margin-bottom: 2rem; }
.match-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.875rem 1rem;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 0.5rem;
  transition: border-color 0.2s;
  cursor: default;
}
.match-card:hover { border-color: #2a3d5e; }
.match-card.live-match { border-color: var(--live); border-left-width: 3px; }
.team {
  display: flex;
  align-items: center;
  gap: 8px;
}
.team.right { flex-direction: row-reverse; text-align: right; }
.flag { font-size: 1.4rem; line-height: 1; }
.team-name { font-size: 14px; font-weight: 500; }
.team-name.muted { color: var(--muted); }
.score-box { text-align: center; min-width: 80px; }
.score {
  font-family: var(--font-display);
  font-size: 1.8rem;
  letter-spacing: 0.1em;
  color: var(--text);
  line-height: 1;
}
.score.live-score { color: var(--live); }
.match-status {
  font-size: 11px;
  margin-top: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.status-live { color: var(--live); animation: pulse 1.4s ease-in-out infinite; }
.status-ft { color: var(--muted); }
.status-sched { color: var(--accent); }
.match-meta {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}
.group-tag {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

/* Standings table */
.standings { margin-bottom: 2rem; }
.group-block { margin-bottom: 1.25rem; }
.group-name {
  font-family: var(--font-display);
  font-size: 1rem;
  letter-spacing: 0.05em;
  color: var(--accent);
  margin-bottom: 6px;
  padding: 0 0.25rem;
}
table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  font-size: 13px;
}
thead th {
  padding: 8px 10px;
  text-align: center;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 500;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
thead th:first-child { text-align: left; padding-left: 12px; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
tbody td { padding: 9px 10px; text-align: center; }
tbody td:first-child { text-align: left; padding-left: 12px; }
.pos { color: var(--muted); font-size: 12px; width: 24px; }
.team-cell { display: flex; align-items: center; gap: 8px; font-weight: 500; }
.pts { font-weight: 600; color: var(--accent); }
.qualify { background: #0f2a1a; }
.qualify td:first-child { border-left: 3px solid var(--live); }

/* Loading / error */
.loading {
  text-align: center;
  padding: 3rem;
  color: var(--muted);
  font-size: 14px;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-box {
  background: #1a0f0f;
  border: 1px solid #4a1f1f;
  border-radius: 10px;
  padding: 1rem;
  color: #f87171;
  font-size: 13px;
  text-align: center;
}

/* Ad slot */
.ad-slot {
  background: var(--surface2);
  border: 1px dashed var(--border);
  border-radius: 10px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 1.5rem;
}

/* Page sections */
.page { display: none; }
.page.active { display: block; }

/* Footer */
footer {
  border-top: 1px solid var(--border);
  text-align: center;
  padding: 1.5rem;
  font-size: 12px;
  color: var(--muted);
}

/* Responsive */
@media (max-width: 480px) {
  .team-name { font-size: 12px; }
  .score { font-size: 1.4rem; }
  .flag { font-size: 1.1rem; }
  .match-card { padding: 0.75rem; }
  header { padding: 0 1rem; }
}
</style>

  'Albania':'рҹҮҰрҹҮұ','Austria':'рҹҮҰрҹҮ№','Hungary':'рҹҮӯрҹҮә','Slovakia':'рҹҮёрҹҮ°','Slovenia':'рҹҮёрҹҮ®',
  'Czech Republic':'рҹҮЁрҹҮҝ','Romania':'рҹҮ·рҹҮҙ','Ukraine':'рҹҮәрҹҮҰ','Greece':'рҹҮ¬рҹҮ·',
  'Norway':'рҹҮірҹҮҙ','Sweden':'рҹҮёрҹҮӘ','Finland':'рҹҮ«рҹҮ®','Iceland':'рҹҮ®рҹҮё','Ireland':'рҹҮ®рҹҮӘ',

  'Panama':'рҹҮөрҹҮҰ','Honduras':'рҹҮӯрҹҮі','El Salvador':'рҹҮёрҹҮ»','Guatemala':'рҹҮ¬рҹҮ№',

  'Indonesia':'рҹҮ®рҹҮ©','Thailand':'рҹҮ№рҹҮӯ','Vietnam':'рҹҮ»рҹҮі','Iraq':'рҹҮ®рҹҮ¶',
  'Jordan':'рҹҮҜрҹҮҙ','Palestine':'рҹҮөрҹҮё','Bahrain':'рҹҮ§рҹҮӯ','Oman':'рҹҮҙрҹҮІ',
  'Kuwait':'рҹҮ°рҹҮј','UAE':'рҹҮҰрҹҮӘ','Syria':'рҹҮёрҹҮҫ','Uzbekistan':'рҹҮәрҹҮҝ',
  'Kazakhstan':'рҹҮ°рҹҮҝ','China PR':'рҹҮЁрҹҮі','China':'рҹҮЁрҹҮі',
};

function flag(name) { return FLAGS[name] || 'рҹҸіпёҸ'; }

function fmtDate(dt) {
  const d = new Date(dt);
  return d.toLocaleDateString('en-GB', { weekday:'short', month:'short', day:'numeric' });
}
function fmtTime(dt) {
  const d = new Date(dt);
  return d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
function isToday(dt) {
  const d = new Date(dt), n = new Date();
  return d.toDateString() === n.toDateString();
}

function statusLabel(m) {
  const s = m.status;
  if (s === 'LIVE' || s === 'IN_PLAY' || s === 'PAUSED') return ['Live ' + (m.minute||'') + "'", 'status-live'];
  if (s === 'FINISHED') return ['FT', 'status-ft'];
  if (s === 'HALFTIME') return ['HT', 'status-live'];
  return [fmtTime(m.utcDate), 'status-sched'];
}

function matchCard(m) {
  const home = m.homeTeam.name;
  const away = m.awayTeam.name;
  const hs = m.score?.fullTime?.home;
  const as = m.score?.fullTime?.away;
  const live = m.status === 'IN_PLAY' || m.status === 'LIVE' || m.status === 'PAUSED' || m.status === 'HALFTIME';
  const lhs = m.score?.regularTime?.home ?? m.score?.halfTime?.home;
  const las = m.score?.regularTime?.away ?? m.score?.halfTime?.away;
  const sh = live ? (lhs ?? 'вҖ“') : (hs !== null && hs !== undefined ? hs : 'вҖ“');
  const sa = live ? (las ?? 'вҖ“') : (as !== null && as !== undefined ? as : 'вҖ“');
  const [statusText, statusClass] = statusLabel(m);
  const scoreClass = live ? 'score live-score' : 'score';

  return `<div class="match-card ${live ? 'live-match' : ''}">
    <div class="team">
      <span class="flag">${flag(home)}</span>
      <span class="team-name">${home}</span>
    </div>
    <div class="score-box">
      <div class="${scoreClass}">${sh} вҖ“ ${sa}</div>
      <div class="match-status ${statusClass}">${statusText}</div>
    </div>
    <div class="team right">
      <span class="flag">${flag(away)}</span>
      <span class="team-name">${away}</span>
    </div>
    <div class="match-meta">
      <span>${fmtDate(m.utcDate)} В· ${m.venue || 'TBD'}</span>
      <span class="group-tag">${m.group || m.stage || ''}</span>
    </div>
  </div>`;
}

async function fetchMatches() {
const res = await fetch(`${BASE}?path=/competitions/${WC_ID}/matches`);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  const data = await res.json();
  return data.matches || [];
}

async function fetchStandings() {
const res = await fetch(`${BASE}?path=/competitions/${WC_ID}/standings`);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  const data = await res.json();
  return data.standings || [];
}

function renderStandings(standings) {
  const el = document.getElementById('standings-container');
  if (!standings.length) { el.innerHTML = '<div class="error-box">No standings data yet.</div>'; return; }
  el.innerHTML = standings.map(group => `
    <div class="group-block">
      <div class="group-name">${group.group || group.stage}</div>
      <table>
        <thead><tr>
          <th>#</th><th style="text-align:left">Team</th>
          <th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th>
        </tr></thead>
        <tbody>
          ${group.table.map((row, i) => `
            <tr class="${i < 2 ? 'qualify' : ''}">
              <td class="pos">${row.position}</td>
              <td><div class="team-cell">${flag(row.team.name)} ${row.team.name}</div></td>
              <td>${row.playedGames}</td>
              <td>${row.won}</td>
              <td>${row.draw}</td>
              <td>${row.lost}</td>
              <td>${row.goalDifference > 0 ? '+' : ''}${row.goalDifference}</td>
              <td class="pts">${row.points}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`).join('');
}

async function init() {
  try {
    const matches = await fetchMatches();
    const today = matches.filter(m => isToday(m.utcDate));
    const todayEl = document.getElementById('today-matches');
    const allEl = document.getElementById('all-matches');
    const countEl = document.getElementById('today-count');

    countEl.textContent = today.length ? `${today.length} matches` : 'No matches today';

    if (today.length) {
      todayEl.innerHTML = today.map(matchCard).join('');
    } else {
      // Show next upcoming matches
      const upcoming = matches.filter(m => new Date(m.utcDate) > new Date()).slice(0, 6);
      todayEl.innerHTML = upcoming.length
        ? `<p style="font-size:13px;color:var(--muted);margin-bottom:12px;">No matches today вҖ” next upcoming:</p>` + upcoming.map(matchCard).join('')
        : '<div class="error-box">No upcoming matches found.</div>';
    }

    allEl.innerHTML = matches.length
      ? matches.map(matchCard).join('')
      : '<div class="error-box">No schedule data available.</div>';

    document.getElementById('update-time').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  } catch (e) {
    console.error(e);
    document.getElementById('today-matches').innerHTML = `<div class="error-box">Could not load data. ${e.message}</div>`;
    document.getElementById('all-matches').innerHTML = `<div class="error-box">Could not load data.</div>`;
    document.getElementById('update-time').textContent = 'Error';
  }

  try {
    const standings = await fetchStandings();
    renderStandings(standings);
  } catch(e) {
    document.getElementById('standings-container').innerHTML = '<div class="error-box">Standings not available yet вҖ” groups will appear after tournament starts.</div>';
  }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.target.classList.add('active');
}

// Init and auto-refresh every 60s
init();
setInterval(init, 60000);
</script>
